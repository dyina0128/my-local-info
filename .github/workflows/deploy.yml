name: 🚀 Deploy to Cloudflare Pages

# 🕒 main 브랜치에 코드가 push되거나 수동으로 시작할 때 실행됩니다
on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. 깃허브 코드 저장소에 있는 소스코드를 가져옵니다
      - name: 📂 소스코드 가져오기
        uses: actions/checkout@v4

      # 2. Node.js 20 환경을 세팅합니다 (캐시를 적용해 속도를 올립니다)
      - name: 🟢 Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. 깨끗하고 일관성 있게 패키지들을 다운로드합니다
      - name: 📦 의존성 패키지 설치
        run: npm ci

      # 4. 프로덕션 배포용 웹사이트 빌드를 수행합니다
      - name: 🏗️ 웹사이트 빌드
        run: npm run build

      # 5. Cloudflare Secrets 보안키들을 사용해 Cloudflare Pages로 배포합니다
      - name: 🚀 Cloudflare Pages로 배포
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler pages deploy out --project-name=my-local-info
